name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend quality ────────────────────────────────────────────────────────
  lint:
    name: Python Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/ scripts/
      - run: ruff format --check src/ tests/ scripts/

  typecheck:
    name: Python Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: mypy src/affectlog/ --ignore-missing-imports

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v --tb=short -m "not slow"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration/ -v --tb=short -m "not slow"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit pip-audit
      - run: bandit -r src/affectlog/ -c pyproject.toml -ll || true
      - run: pip-audit --desc on || true

  openapi-validate:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "."
      - name: Export OpenAPI spec
        run: |
          python3 -c "
          from affectlog.api.main import app
          import json, yaml
          spec = app.openapi()
          with open('docs/openapi.yaml', 'w') as f:
              yaml.dump(spec, f, allow_unicode=True)
          print('OpenAPI spec exported')
          " || true
      - run: bash scripts/validate_openapi.sh || true

  # ── Frontend quality ───────────────────────────────────────────────────────
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/affectlog/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/affectlog/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Route validation
        run: npm run validate:routes
      - name: Link validation
        run: npm run validate:links
      - name: CTA validation
        run: npm run validate:ctas
      - name: Navigation validation
        run: npm run validate:nav
      - name: Docs link validation
        run: npm run validate:docs
      - name: Sitemap validation
        run: npm run validate:sitemap

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-quality
    defaults:
      run:
        working-directory: src/affectlog/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/affectlog/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/affectlog/frontend/dist/
          retention-days: 7

  # ── E2E tests ──────────────────────────────────────────────────────────────
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: src/affectlog/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/affectlog/frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Serve and run E2E tests
        run: |
          npx serve dist -p 3000 --single &
          sleep 3
          npx playwright test ../../tests/e2e/navigation.spec.ts ../../tests/e2e/footer-links.spec.ts ../../tests/e2e/cta-links.spec.ts ../../tests/e2e/route-guards.spec.ts --reporter=html,line
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: src/affectlog/frontend/playwright-report/
          retention-days: 7
