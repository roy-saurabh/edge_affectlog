server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json application/x-javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Immutable hashed assets — long cache
    location ~* \.(?:js|css|woff2?|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Swagger UI — rewrite /api/docs → /docs on FastAPI (mirrors vite dev proxy rewrite).
    # FastAPI serves swagger at /docs; the SPA owns /docs so we expose it via /api/docs.
    location /api/docs {
        rewrite ^/api/docs(.*)$ /docs$1 break;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ReDoc — same pattern as swagger
    location /api/redoc {
        rewrite ^/api/redoc(.*)$ /redoc$1 break;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy all other /api/* to FastAPI backend (path forwarded as-is)
    location /api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct FastAPI route access (used by authenticated API client)
    location /v1 {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # FastAPI swagger UI fetches the spec at /openapi.json (relative to browser origin).
    # Without this, the SPA fallback would serve index.html instead of the JSON spec.
    location = /openapi.json {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FastAPI OAuth2 redirect used by swagger UI try-it auth flow
    location /docs/oauth2-redirect {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — all other paths served by React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
